<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Estedad:wght@100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body class="flex h-[100vh] justify-center items-center">
    <div
      class="p-28 shadow-sm shadow-white rounded-xl bg-gradient-to-r from-sky-400 to-sky-300"
    >
      <form class="flex flex-col gap-5">
        <p class="text-gray-800 font-semibold">Name</p>
        <input
          type="text"
          class="border border-gray-300 focus:ring-2 focus:ring-gray-400 focus:border-transparent focus:outline-none rounded mt-[-1rem] p-2"
        />
        <p class="text-gray-800 font-semibold">Email</p>
        <input
          type="email"
          class="border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent mt-[-1rem]"
        />
        <label class="text-gray-800 font-semibold">Message</label>
        <textarea
          class="resize-none focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent rounded w-64 h-32 border border-gray-300 mt-[-1rem]"
        ></textarea>
      </form>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
